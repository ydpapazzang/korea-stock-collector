name: BB Screener Cron
on:
  schedule:
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 23,0,1 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Call Screener
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
          https://bb-screener.vercel.app/api/index
