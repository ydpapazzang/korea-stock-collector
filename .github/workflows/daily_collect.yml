name: Daily Korea Stock Collector

on:
  schedule:
    - cron: "30 8 * * 1-5"
  workflow_dispatch:
    inputs:
      date:
        description: "수집 기준일 YYYYMMDD (비워두면 전 영업일)"
        required: false
        default: ""

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collector
        run: |
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.date }}"
          fi
          python main.py $DATE_ARG --output data

      - name: Delete old CSV files
        run: python cleanup.py --days 7 --output data

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "📊 $(date +'%Y-%m-%d') 주식 데이터 업데이트"
          git push
